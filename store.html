<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Online Gadget Store - TechHub</title>
  <meta name="description" content="Shop the best quality replacement screens, repair components, custom toolkits, and top-tier smart tech gadgets online. Order now on TechHub.">
  <link rel="stylesheet" href="style.css">
  
  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Online Gadget Store - TechHub">
  <meta property="og:description" content="Shop the best quality replacement parts, toolkits, and top-tier gadgets.">
</head>
<body>

  <!-- Dynamic Header -->
  <div id="navbar-container"></div>

  <main class="container">
    <!-- Search Section -->
    <section class="search-section">
      <div class="search-bar-wrapper">
        <svg class="search-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        <input type="text" id="main-search-input" class="search-input" placeholder="Search products in store...">
      </div>
    </section>

    <!-- Posts list -->
    <section style="margin-top: 20px;">
      <h2 class="section-title">
        <span>Available Products & Parts</span>
      </h2>
      <div class="posts-grid" id="posts-grid-container">
        <div class="empty-message">
          <h3>Loading store items...</h3>
        </div>
      </div>
    </section>
  </main>

  <!-- Dynamic Footer -->
  <div id="footer-container"></div>

  <script type="module" src="firebase-db.js"></script>
  <script type="module" src="shared.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
